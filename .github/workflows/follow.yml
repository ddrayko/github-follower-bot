name: Follow Torvalds Followers

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  follow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Config git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run follow bot
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_FOLLOW }}
          BOT_USERNAME: ${{ github.actor }}
        run: python -u follow.py
